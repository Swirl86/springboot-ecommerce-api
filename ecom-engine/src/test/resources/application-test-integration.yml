spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false

jwt:
  secret: "test-secret-test-secret-test-secret-123456"
  expiration: 3600000

logging:
  level:
    root: WARN
    com.swirl.ecomengine: DEBUG
