spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ecom
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

# JWT configuration for dev environment
jwt:
  secret: "dev-secret-key-change-me"
  expiration: 3600000   # 1 hour
