name: CI Pipeline

# ---------------------------------------------------------
# When the pipeline should run
# ---------------------------------------------------------
on:
    push:
        branches: ["**"] # Run on every push to any branch
    pull_request:
        branches: ["**"] # Run on every pull request

jobs:
    build:
        runs-on: ubuntu-latest # Use the latest Ubuntu runner

        steps:
            # -----------------------------------------------------
            # 1. Check out the repository code
            # -----------------------------------------------------
            - name: Checkout repository
              uses: actions/checkout@v4

            # -----------------------------------------------------
            # 2. Install JDK 17 (Temurin = OpenJDK distribution)
            # -----------------------------------------------------
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17

            # -----------------------------------------------------
            # 3. Cache Maven dependencies for faster builds
            #    This saves the ~/.m2 folder between runs
            # -----------------------------------------------------
            - name: Cache Maven packages
              uses: actions/cache@v4
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
                  restore-keys: |
                      ${{ runner.os }}-m2-

            # -----------------------------------------------------
            # 4. Build the project and run all tests
            #    'mvn verify' = compile + test + integration checks
            # -----------------------------------------------------
            - name: Build and run tests
              working-directory: ./ecom-engine
              run: mvn -B verify

            # -----------------------------------------------------
            # 5. Upload test results (Surefire + Failsafe)
            # -----------------------------------------------------
            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: |
                      ecom-engine/target/surefire-reports
                      ecom-engine/target/failsafe-reports

            # -----------------------------------------------------
            # 6. Upload JaCoCo coverage report
            # -----------------------------------------------------
            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: ecom-engine/target/site/jacoco
